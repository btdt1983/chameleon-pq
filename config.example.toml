# Chameleon-PQ — configuratiebestand
# Genereer sleutels met: chameleon-pq keygen

[identity]
# Eigen Ed25519 seed (32 bytes hex) — GEHEIM houden.
ed25519_seed_hex      = "0101010101010101010101010101010101010101010101010101010101010101"
# Voorgedeelde publieke sleutel van de peer — uit 'keygen' van de andere kant.
peer_ed25519_pub_hex  = "0909090909090909090909090909090909090909090909090909090909090909"

# ── Hybride post-quantum peer-auth (AANBEVOLEN) ─────────────────────────────
# Vul deze twee in voor hybride Ed25519 + ML-DSA-65 authenticatie. De sleutels
# zijn groot; genereer ze met `chameleon-pq keygen` en plak de hex hier.
# Zet ze aan BEIDE kanten, of laat ze aan beide kanten weg voor Ed25519-only.
#   mldsa_secret_hex    = "…eigen ML-DSA secret key (geheim)…"
#   peer_mldsa_pub_hex  = "…ML-DSA publieke sleutel van de peer…"

[network]
# Server luistert hier op; client verbindt hierheen (overschrijfbaar via --bind / --server).
bind_addr   = "0.0.0.0:51820"
server_addr = "1.2.3.4:51820"   # alleen nodig in client-modus

[tun]
name    = "chameleon0"           # interface-naam (Linux/macOS: vrije keuze; Windows: ook)
address = "10.99.0.1"           # IP-adres van deze kant van de tunnel
netmask = "255.255.255.0"
mtu     = 1200                  # MTU-veilig voor het geobf. datapad (max 1232);
                                # groter fragmenteert IP en verraadt/breekt de obf
# Full-tunnel routing (CLIENT-kant, WireGuard-stijl). Met route_all = true zet de
# client bij connect ALLE verkeer door de tunnel (0.0.0.0/0) én pint het server-
# endpoint aan de fysieke gateway, en ruimt dat bij disconnect weer op — geen
# handmatige `route add` meer nodig. Vereist admin (Windows) / CAP_NET_ADMIN.
# peer_address = het TUN-adres van de ANDERE kant (de server), de gateway waar de
# client doorheen routeert. Laat route_all weg (of false) voor split-tunnel.
route_all    = false
# peer_address = "10.99.0.1"     # zet dit op de client (server-TUN-adres)

[engine]
# Maximale wachttijd (µs) voor een batch voordat die geflusht wordt.
# 200 µs is veilig voor gaming; verhoog voor hogere throughput.
# Het datapad draait volledig op de CPU (constant-time, low-latency).
batch_linger_us = 200
# Aantal crypto-worker-threads (parallelle seal/open over cores). 0 = auto = alle
# cores. Alleen van invloed op het SNELLE pad (traffic.enabled = false); met
# timing-shaping aan capt de rate de doorvoer, dus dan is dit niet de bottleneck.
workers = 0
# UDP-GSO: bundel meerdere datagrammen in één send-syscall. Standaard UIT (false).
# Aan zetten kan de doorvoer verhogen op een schoon Linux↔Linux-pad, MAAR op
# sommige paden (Hyper-V vSwitch, bepaalde NIC-offload) wordt de gesegmenteerde
# super-buffer in z'n geheel gedropt → massaal pakketverlies en een instortende
# download. Laat op false tenzij je pad bewezen schoon is.
gso = false

[obfuscation]
# Verkeersanalyse-weerstand op het DATApad (QUIC-stijl header-protection):
# geen zichtbaar type-byte, session_id of counter, en padding tegen grootte-
# lekkage. Standaard AAN — dit maakt het datapad incompatibel met 0.1.0-peers
# (beide kanten moeten deze build draaien). Zet op false voor het klassieke,
# niet-geobfusceerde frame (bv. voor debugging).
enabled = true
# Padding-beleid: "off" | "bucketed" | "full".
#   off      — geen padding (grootte lekt de plaintext-lengte)
#   bucketed — pad naar grootteklassen (verbergt exacte lengte; aanbevolen)
#   full     — pad elk pakket naar de MTU-veilige max (beste obfuscatie, duurst)
padding = "bucketed"
# Obfusceer óók de HANDSHAKE-envelope (geen zichtbaar type-byte/fragment-header,
# wisselend-grote fragmenten). Standaard AAN — beide kanten moeten dit gelijk
# hebben (incompatibel met 0.1.x-peers). Zet op false voor de klassieke handshake.
handshake = true
# Optioneel: gedeeld obfuscatie-geheim (hex, >= 16 bytes) voor de handshake.
# Zonder dit wordt de handshake-obfuscatiesleutel afgeleid uit de voorgedeelde
# Ed25519-pubkeys (nul config). Mét dit kan een tegenstander die alleen de
# pubkeys heeft de handshake niet de-obfusceren. Zet op BEIDE kanten hetzelfde.
#   psk_hex = "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"

[traffic]
# Timing-/cover-traffic-obfuscatie: verstuur op een VAST tempo en vul lege slots
# met dummy-pakketten, zodat burst-/idle-patronen verdwijnen (de laatste dimensie
# van verkeersanalyse). Vereist obfuscation.enabled = true.
#
# Kies een PROFILE; dat zet mode/rate_pps/burst in één keer goed. De effectieve
# rate (rate_pps × burst) is je doorvoerplafond (verkeer daarboven wordt gedropt)
# én, in CBR, je constante bandbreedte (~1232 B per pakket op de lijn).
#
#   "stealth"    — CBR, 256×2 ≈ 5 Mbit/s. Max anti-analyse; constante bandbreedte
#                  24/7 (≈ 1,6 TB/maand/richting). Voor licht, onopvallend verkeer.
#   "balanced"   — STANDAARD. Adaptive, 3000×4 ≈ 115 Mbit/s. Timing verborgen
#                  tijdens gebruik, STIL in rust. Goede algemene VPN-ervaring.
#   "throughput" — Adaptive, 6000×8 ≈ 460 Mbit/s. Max snelheid mét pacing.
#   "off"        — Pacer UIT: native timing/snelheid, GEEN timing-verhulling.
#                  WireGuard-vergelijkbaar (packet-vorm-padding blijft wél aan).
#   "custom"     — gebruik de losse mode/rate_pps/burst-velden hieronder.
profile = "balanced"

# De onderstaande velden gelden ALLEEN bij profile = "custom".
enabled  = true
# "adaptive" — pace tijdens activiteit + cooldown, stil in rust
# "cbr"      — constant bit-rate (altijd op tempo, ook idle; sterkst, duurst)
mode     = "adaptive"
rate_pps = 256      # emissie-slots per seconde
burst    = 2        # pakketten per slot (rate = rate_pps × burst)
cooldown_ms = 500   # adaptive: cover blijft zo lang na het laatste echte pakket

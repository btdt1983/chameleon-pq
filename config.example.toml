# Chameleon-PQ — configuration file
# Generate keys with: chameleon-pq keygen

[identity]
# Own Ed25519 seed (32 bytes hex) — keep SECRET.
ed25519_seed_hex      = "0101010101010101010101010101010101010101010101010101010101010101"
# Peer's pre-shared public key — from 'keygen' on the other side.
peer_ed25519_pub_hex  = "0909090909090909090909090909090909090909090909090909090909090909"

# ── Hybrid post-quantum peer auth (RECOMMENDED) ─────────────────────────────
# Fill in these two for hybrid Ed25519 + ML-DSA-65 authentication. The keys
# are large; generate them with `chameleon-pq keygen` and paste the hex here.
# Set them on BOTH sides, or omit them on both sides for Ed25519 only.
#   mldsa_secret_hex    = "…own ML-DSA secret key (secret)…"
#   peer_mldsa_pub_hex  = "…peer's ML-DSA public key…"

[network]
# Server listens here; client connects here (overridable via --bind / --server).
bind_addr   = "0.0.0.0:51820"
server_addr = "1.2.3.4:51820"   # only needed in client mode

[tun]
name    = "chameleon0"           # interface name (Linux/macOS: free choice; Windows: too)
address = "10.99.0.1"           # IP address of this side of the tunnel
netmask = "255.255.255.0"
mtu     = 1200                  # MTU-safe for the obfuscated data path (max 1232);
                                # larger fragments IP and reveals/breaks the obf
# Full-tunnel routing (CLIENT side, WireGuard style). With route_all = true the
# client routes ALL traffic through the tunnel on connect (0.0.0.0/0) and pins
# the server endpoint to the physical gateway, cleaning that up on disconnect —
# no manual `route add` needed. Requires admin (Windows) / CAP_NET_ADMIN.
# peer_address = the TUN address of the OTHER side (the server), the gateway the
# client routes through. Omit route_all (or false) for split-tunnel.
route_all    = false
# peer_address = "10.99.0.1"     # set this on the client (server TUN address)
# Kill switch (CLIENT side, full-tunnel only). With kill_switch = true the client
# installs a fail-closed firewall while connected: if the tunnel drops, traffic is
# BLOCKED rather than leaking to the physical NIC in cleartext. Only loopback, the
# LAN, DHCP and the tunnel's own paths stay open. Unlike route_all it survives an
# unexpected drop — remove it with a deliberate disconnect or `chameleon-pq
# killswitch off`. Needs route_all = true. Default off (opt-in).
kill_switch  = false

[engine]
# Maximum wait time (µs) for a batch before it is flushed.
# 200 µs is safe for gaming; increase for higher throughput.
# The data path runs entirely on the CPU (constant-time, low-latency).
batch_linger_us = 200
# Number of crypto worker threads (parallel seal/open across cores). 0 = auto =
# all cores. Only affects the FAST path (traffic.enabled = false); with timing
# shaping on the rate caps throughput, so then this is not the bottleneck.
workers = 0
# UDP GSO: bundle multiple datagrams into one send syscall. Default OFF (false).
# Enabling it can raise throughput on a clean Linux↔Linux path, BUT on some
# paths (Hyper-V vSwitch, certain NIC offload) the segmented super-buffer is
# dropped in its entirety → massive packet loss and a collapsing download.
# Leave at false unless your path is proven clean.
gso = false

[obfuscation]
# Traffic-analysis resistance on the DATA path (QUIC-style header protection):
# no visible type byte, session_id or counter, and padding against size
# leakage. Default ON — this makes the data path incompatible with 0.1.0 peers
# (both sides must run this build). Set to false for the classic,
# non-obfuscated frame (e.g. for debugging).
enabled = true
# Padding policy: "off" | "bucketed" | "full".
#   off      — no padding (size leaks the plaintext length)
#   bucketed — pad to size classes (hides exact length; recommended)
#   full     — pad every packet to the MTU-safe max (best obfuscation, costliest)
padding = "bucketed"
# Also obfuscate the HANDSHAKE envelope (no visible type byte/fragment header,
# varying-size fragments). Default ON — both sides must have this the same
# (incompatible with 0.1.x peers). Set to false for the classic handshake.
handshake = true
# Optional: shared obfuscation secret (hex, >= 16 bytes) for the handshake.
# Without it the handshake obfuscation key is derived from the pre-shared
# Ed25519 pubkeys (zero config). With it, an adversary who only has the
# pubkeys cannot de-obfuscate the handshake. Set the same on BOTH sides.
#   psk_hex = "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"

[traffic]
# Timing/cover-traffic obfuscation: send at a FIXED tempo and fill empty slots
# with dummy packets, so burst/idle patterns disappear (the last dimension of
# traffic analysis). Requires obfuscation.enabled = true.
#
# Choose a PROFILE; that sets mode/rate_pps/burst correctly in one go. The
# effective rate (rate_pps × burst) is your throughput ceiling (traffic above it
# is dropped) and, in CBR, your constant bandwidth (~1232 B per packet on the wire).
#
#   "stealth"    — CBR, 256×2 ≈ 5 Mbit/s. Max anti-analysis; constant bandwidth
#                  24/7 (≈ 1.6 TB/month/direction). For light, inconspicuous traffic.
#   "balanced"   — Adaptive, 3000×4 ≈ 115 Mbit/s. Timing hidden during
#                  use, SILENT at rest. Good general VPN experience.
#   "throughput" — Adaptive, 6000×8 ≈ 460 Mbit/s. Max speed with pacing.
#   "off"        — DEFAULT. Pacer OFF: native timing/speed, NO timing
#                  concealment. WireGuard-comparable (packet-shape padding stays
#                  on). Choose "balanced"/"stealth" for timing resistance.
#   "custom"     — use the individual mode/rate_pps/burst fields below.
profile = "off"

# The fields below apply ONLY with profile = "custom".
enabled  = true
# "adaptive" — pace during activity + cooldown, silent at rest
# "cbr"      — constant bit-rate (always at tempo, even idle; strongest, costliest)
mode     = "adaptive"
rate_pps = 256      # emission slots per second
burst    = 2        # packets per slot (rate = rate_pps × burst)
cooldown_ms = 500   # adaptive: cover lasts this long after the last real packet

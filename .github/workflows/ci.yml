name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build and test on Linux + Windows. macOS is omitted but trivial to add.
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      # Upload the release binary as an artifact for every successful build,
      # so you can grab a fresh build from any commit without tagging.
      - name: Upload Linux binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-pq-linux
          path: target/release/chameleon-pq

      - name: Upload Windows binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-pq-windows
          path: target/release/chameleon-pq.exe

  # Extra hygiene checks. Non-blocking failures are configured per step.
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true   # informational at this stage

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true   # informational at this stage

      - name: Cargo audit (RustSec advisory scan)
        run: |
          cargo install cargo-audit --locked || true
          cargo audit
        continue-on-error: true   # informational — flags vulnerable/yanked deps

  # Tagged releases (e.g. `git tag v0.1.0 && git push --tags`) automatically
  # publish a GitHub Release with the built binaries attached.
  release:
    name: Publish release
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chameleon-pq-linux
          path: ./linux
      - uses: actions/download-artifact@v4
        with:
          name: chameleon-pq-windows
          path: ./windows
      - name: Rename for release
        run: |
          mv linux/chameleon-pq chameleon-pq-linux-x86_64
          mv windows/chameleon-pq.exe chameleon-pq-windows-x86_64.exe
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chameleon-pq-linux-x86_64
            chameleon-pq-windows-x86_64.exe
          generate_release_notes: true

name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 4 * * 1'   # wekelijks (ma 04:00 UTC): coverage-guided fuzzing
  workflow_dispatch: {}   # handmatig te starten

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build and test on Linux + Windows. macOS is omitted but trivial to add.
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      # Upload the release binary as an artifact for every successful build,
      # so you can grab a fresh build from any commit without tagging.
      - name: Upload Linux binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-pq-linux
          path: target/release/chameleon-pq

      - name: Upload Windows binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-pq-windows
          path: target/release/chameleon-pq.exe

  # Extra hygiene checks. Non-blocking failures are configured per step.
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true   # informational at this stage

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true   # informational at this stage

      - name: Cargo audit (RustSec advisory scan)
        run: |
          cargo install cargo-audit --locked || true
          cargo audit
        continue-on-error: true   # informational — flags vulnerable/yanked deps

  # Tagged releases (e.g. `git tag v0.1.0 && git push --tags`) automatically
  # publish a GitHub Release with the built binaries attached.
  release:
    name: Publish release
    # Wait for the GUI build too: the Windows bundle ships the GUI client.
    needs: [build-test, gui]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Needed for config.example.toml and the bundle README template.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: chameleon-pq-linux
          path: ./linux
      - uses: actions/download-artifact@v4
        with:
          name: chameleon-pq-windows
          path: ./windows
      - uses: actions/download-artifact@v4
        with:
          name: chameleon-gui-windows
          path: ./gui-win

      # Wintun is not vendored in git. Fetch the official Microsoft-signed DLL
      # and pin it to the exact bytes we tested (SHA-256 of the amd64 DLL), so a
      # silently-repackaged upstream can never slip a different binary into the
      # release.
      - name: Fetch and verify Wintun (amd64)
        run: |
          WINTUN_VER=0.14.1
          WINTUN_DLL_SHA256=e5da8447dc2c320edc0fc52fa01885c103de8c118481f683643cacc3220dafce
          curl -fsSL "https://www.wintun.net/builds/wintun-${WINTUN_VER}.zip" -o wintun.zip
          unzip -q wintun.zip
          echo "${WINTUN_DLL_SHA256}  wintun/bin/amd64/wintun.dll" | sha256sum -c -

      # Self-contained Windows bundle: GUI + CLI + wintun.dll + example config +
      # usage notes, in one versioned zip that works out of the box.
      - name: Assemble Windows bundle
        run: |
          VER="${GITHUB_REF_NAME#v}"
          DIR="chameleon-pq-${VER}-windows-x64"
          mkdir -p "$DIR"
          cp gui-win/chameleon-gui.exe             "$DIR/chameleon-gui.exe"
          cp windows/chameleon-pq.exe              "$DIR/chameleon-pq.exe"
          cp wintun/bin/amd64/wintun.dll           "$DIR/wintun.dll"
          cp config.example.toml                   "$DIR/config.example.toml"
          cp packaging/windows/README-windows.txt  "$DIR/README-windows.txt"
          zip -r "${DIR}.zip" "$DIR"

      - name: Rename loose binaries for release
        run: |
          mv linux/chameleon-pq        chameleon-pq-linux-x86_64
          mv windows/chameleon-pq.exe  chameleon-pq-windows-x86_64.exe
          cp gui-win/chameleon-gui.exe chameleon-gui.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chameleon-pq-*-windows-x64.zip
            chameleon-pq-linux-x86_64
            chameleon-pq-windows-x86_64.exe
            chameleon-gui.exe
          generate_release_notes: true

  # Publish the crate to crates.io on a `vX.Y.Z` tag (after tests pass). Needs a
  # crates.io API token in the `CARGO_REGISTRY_TOKEN` repo secret. Idempotent:
  # skips if that version is already published, so a re-run or a manual
  # `cargo publish` won't fail the job.
  publish-crates:
    name: Publish to crates.io
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (skip if version already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "::error::tag v$TAG_VER does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
          if curl -fsS -A "chameleon-ci" \
              "https://crates.io/api/v1/crates/chameleon-pq/$CARGO_VER" >/dev/null 2>&1; then
            echo "chameleon-pq $CARGO_VER is already on crates.io — skipping publish"
          else
            echo "Publishing chameleon-pq $CARGO_VER to crates.io"
            cargo publish
          fi

  # Coverage-guided fuzzing of the attacker-facing parsers (nightly + cargo-fuzz).
  # Runs weekly / on demand — NOT on every push, since the stable
  # `tests/fuzz_parsers.rs` harness already guards each commit. Each target runs
  # briefly; a crash fails the job (a found bug is a real signal).
  fuzz:
    name: Fuzz parsers (nightly cargo-fuzz)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz each target (2 min each)
        run: |
          for t in frame_decode handshake_decode obf_parsers hsobf_parsers reassembler session_decrypt; do
            echo "::group::fuzz $t"
            cargo fuzz run "$t" -- -max_total_time=120
            echo "::endgroup::"
          done

  # Build the desktop GUI (iced) on Windows — the target platform for the client.
  # Separate crate (gui/), so it isn't covered by build-test. Uploads the .exe so
  # you can grab a fresh Windows build without a local toolchain.
  gui:
    name: Build GUI (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & gui target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gui/target
          key: ${{ runner.os }}-gui-${{ hashFiles('gui/Cargo.toml', 'Cargo.lock') }}
      - name: Build GUI (release)
        run: cargo build --release --manifest-path gui/Cargo.toml
      - name: Upload GUI binary
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-gui-windows
          path: gui/target/release/chameleon-gui.exe

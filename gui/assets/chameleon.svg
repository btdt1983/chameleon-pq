<svg viewBox="0 0 140 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chameleon">
  <!-- branch the feet grip -->
  <path d="M14 106 H126" stroke="#1f7a45" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- BODY first, so legs + tail draw on top: snout, casque crest, arched back, belly -->
  <path fill="#2ec16b" d="
    M14 54
    C 20 45 29 41 37 40
    C 39 32 45 28 53 27
    C 52 34 49 39 46 43
    C 62 38 78 42 90 52
    C 96 57 95 64 88 66
    C 74 71 52 71 41 67
    C 33 64 29 59 29 54
    C 24 55 18 55 14 54 Z"/>

  <!-- legs, on top -->
  <g stroke="#1f8f4e" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M49 65 C 48 80 47 92 46 103"/>
    <path d="M79 63 C 81 79 82 92 82 103"/>
  </g>

  <!-- prehensile TAIL: bold spiral curling down-right from the rear, on top -->
  <path d="M89 60 C 109 57 119 73 110 85 C 103 94 90 92 88 81 C 87 74 95 70 99 74 C 101 76 100 79 98 79"
        fill="none" stroke="#2ec16b" stroke-width="9" stroke-linecap="round"/>

  <!-- turret eye -->
  <circle cx="31" cy="50" r="5.6" fill="#0b3a22"/>
  <circle cx="32.8" cy="48.2" r="2" fill="#eafff3"/>
</svg>
